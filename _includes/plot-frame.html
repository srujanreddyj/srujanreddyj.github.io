<div class="plot-frame">
  <iframe
    src="{{ include.src | relative_url }}"
    title="{{ include.title | default: 'Interactive chart' | escape }}"
    loading="lazy">
  </iframe>
  <p>
    <a href="{{ include.src | relative_url }}" target="_blank" rel="noopener">
      Open interactive chart
    </a>
  </p>
</div>
